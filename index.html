<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A minimal personal app store to access all of Vidyadhar's apps in one place." />
    <title>Vidyadhar's App Store</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="site-header">
        <h1 class="site-title">Vidyadhar's App Store</h1>
        <p class="site-subtitle">All my apps, one click away.</p>
      </header>

      <section class="controls" aria-label="Search and filter">
        <input
          id="search"
          class="search-input"
          type="search"
          placeholder="Search apps…"
          autocomplete="off"
        />
        <div id="tag-filter" class="tag-filter" role="group" aria-label="Filter by tag"></div>
      </section>

      <section
        id="app-grid"
        class="app-grid"
        aria-label="Apps"
        aria-live="polite"
      ></section>

      <p id="empty-state" class="empty-state" hidden>
        No apps match. Try clearing your search or filter.
      </p>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
